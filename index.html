<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 文法 — Gramatyka Genki wg form</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070310; --bg2:#0d0720; --panel:#120a26; --panel2:#190f33;
  --ink:#f7f2ff; --mut:#c3b1e4; --faint:#8b7cb4;
  --np:#ff2ea6; --nc:#26e6ff; --na:#ffb020; --nv:#9b6bff;
  --line:rgba(155,107,255,.16); --line2:rgba(155,107,255,.30);
  --jp:"Zen Maru Gothic","Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  --ui:"Noto Sans JP",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --neon:"DotGothic16","Noto Sans JP",monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--ui);color:var(--ink);
  background:
    radial-gradient(900px 560px at 85% -6%, rgba(255,46,166,.13), transparent 60%),
    radial-gradient(900px 620px at -5% 12%, rgba(38,230,255,.10), transparent 55%),
    radial-gradient(700px 500px at 50% 110%, rgba(155,107,255,.10), transparent 60%),
    radial-gradient(rgba(255,255,255,.045) 1px, transparent 1.5px),
    var(--bg);
  background-size:auto,auto,auto,26px 26px,auto;
  -webkit-font-smoothing:antialiased;}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 90px}

header.top{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(7,3,16,.95),rgba(7,3,16,.74));
  border-bottom:1px solid var(--line)}
.top-inner{max-width:1180px;margin:0 auto;padding:16px 20px 12px}
.brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand .jpt{order:1;font-family:var(--neon);font-size:27px;font-weight:400;letter-spacing:.08em;color:#ffd9ee;
  text-shadow:0 0 6px #ff5cbe,0 0 16px var(--np),0 0 38px var(--np);
  animation:signFlicker 7s linear infinite}
.brand h1{order:2;font-size:15px;margin:0;font-weight:600;color:var(--mut)}
.brand-right{order:3;margin-left:auto;display:flex;align-items:center;gap:12px}
.langtog{display:flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden;background:rgba(10,5,24,.7)}
.langtog button{border:0;background:transparent;color:var(--mut);font-family:var(--ui);font-size:12.5px;
  font-weight:600;padding:6px 13px;cursor:pointer;transition:.15s}
.langtog button:hover{color:var(--ink)}
.langtog button.active{background:linear-gradient(90deg,var(--np),var(--nv));color:#0b0416;
  box-shadow:0 0 12px rgba(255,46,166,.55)}
.sub{margin:6px 0 0;color:var(--faint);font-size:13px}
.chips-row{order:4;flex-basis:100%;min-width:0;display:flex;align-items:center;gap:8px;margin-top:12px}

/* ── scrolled header: search + filters jump into the title's place ── */
header.top.scrolled .brand{align-items:center}
header.top.scrolled .brand h1{display:none}
header.top.scrolled .chips-row{order:2;flex-basis:0;flex:1;margin-top:0;animation:slotIn .22s ease}
@keyframes slotIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){header.top.scrolled .chips-row{animation:none}}
/* ── mobile: don't cram filters next to the language toggle when scrolled ── */
@media(max-width:760px){
  /* keep the search+filters on their own full-width row, below the neon sign + langtog */
  header.top.scrolled .chips-row{order:4;flex:0 1 100%;flex-basis:100%;margin-top:10px}
  /* top row = neon sign (left) + language toggle (right), nothing overlapping */
  header.top.scrolled .brand-right{order:3;margin-left:auto}
}
.searchbox{display:flex;align-items:center;flex:none;height:38px;border:1px solid var(--line2);
  background:rgba(10,5,24,.7);border-radius:999px;overflow:hidden;transition:border-color .15s,box-shadow .2s}
.searchbox .sicon{border:0;background:transparent;color:var(--mut);cursor:pointer;flex:none;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.searchbox .sicon:hover{color:var(--ink)}
.searchbox input{width:0;min-width:0;opacity:0;border:0;outline:0;background:transparent;
  color:var(--ink);font-size:14px;font-family:var(--ui);transition:width .2s,opacity .2s,padding .2s;padding:0}
.searchbox .clr{display:none;border:0;background:transparent;color:var(--faint);cursor:pointer;
  font-size:18px;padding:4px 10px 4px 4px;flex:none}
.searchbox.open{border-color:var(--nc);box-shadow:0 0 0 3px rgba(38,230,255,.14),0 0 16px rgba(38,230,255,.35)}
.searchbox.open input{width:min(240px,46vw);opacity:1;padding:0 4px}
.searchbox.open .sicon{color:var(--nc)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0;scrollbar-width:thin;flex:1}
.chip{white-space:nowrap;border:1px solid var(--line2);background:rgba(10,5,24,.7);color:var(--mut);
  padding:7px 13px;border-radius:999px;font-size:12.5px;cursor:pointer;font-family:var(--ui);
  display:flex;align-items:center;gap:7px;transition:.15s;user-select:none}
.chip:hover{border-color:var(--nc);color:var(--ink);transform:translateY(-1px);
  box-shadow:0 0 10px rgba(38,230,255,.25)}
.chip .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
.chip.active{color:#0b0416;font-weight:700;box-shadow:0 0 14px rgba(255,255,255,.25)}
.chip.all{font-weight:600}
.chip.all.active{background:linear-gradient(90deg,var(--np),var(--nc));border-color:transparent;
  box-shadow:0 0 16px rgba(255,46,166,.5)}

/* ── neon hero: kot + ramen ── */
.hero{display:flex;align-items:center;gap:26px;margin:30px 2px 4px;flex-wrap:wrap}
.neonCat{width:230px;max-width:56vw;flex:none;filter:drop-shadow(0 14px 30px rgba(255,46,166,.14))}
.hero-txt{flex:1;min-width:230px}
.hero-sign{font-family:var(--neon);font-size:clamp(34px,6vw,54px);line-height:1.1;letter-spacing:.1em;
  color:#dffaff;text-shadow:0 0 6px #7deeff,0 0 18px var(--nc),0 0 44px var(--nc)}
.hero-sign .hs2{color:#ffd9ee;text-shadow:0 0 6px #ff8fd0,0 0 18px var(--np),0 0 44px var(--np);
  animation:signFlicker 5.5s linear infinite .8s}
.hero-tag{color:var(--mut);font-size:14.5px;line-height:1.65;max-width:520px;margin:12px 0 0}
.hero-open{display:inline-flex;align-items:center;gap:8px;margin-top:14px;
  border:1px solid rgba(255,176,32,.55);border-radius:999px;padding:6px 14px;
  font-family:var(--neon);font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  color:#ffe2ad;text-shadow:0 0 10px rgba(255,176,32,.8);box-shadow:0 0 14px rgba(255,176,32,.22),inset 0 0 10px rgba(255,176,32,.12)}
.hero-open .op-dot{width:8px;height:8px;border-radius:50%;background:var(--na);
  box-shadow:0 0 10px var(--na);animation:blinkDot 2.4s ease-in-out infinite}
.vsign{flex:none;display:flex;flex-direction:column;gap:6px;padding:14px 10px;margin-left:auto;
  border:1.5px solid rgba(38,230,255,.6);border-radius:12px;
  box-shadow:0 0 18px rgba(38,230,255,.30),inset 0 0 14px rgba(38,230,255,.12);
  font-family:var(--neon);font-size:21px;color:#c9f7ff;text-align:center;
  text-shadow:0 0 6px #7deeff,0 0 16px var(--nc)}
@media(max-width:760px){.vsign{display:none}}
@keyframes signFlicker{
  0%,6.5%,7.5%,26%,27.5%,100%{opacity:1}
  7%{opacity:.55} 26.8%{opacity:.7} 27.2%{opacity:.5}}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.35}}
.steam path{stroke:#d9f6ff;opacity:.75;animation:steamFloat 3.4s ease-in-out infinite}
.steam path:nth-child(2){animation-delay:1.1s}
.steam path:nth-child(3){animation-delay:2.2s}
@keyframes steamFloat{
  0%{transform:translateY(5px);opacity:0}
  30%{opacity:.8}
  100%{transform:translateY(-9px);opacity:0}}
@media(prefers-reduced-motion:reduce){
  .brand .jpt,.hero-sign .hs2,.steam path,.hero-open .op-dot{animation:none}
  .steam path{opacity:.6}}

.suns{display:grid;gap:16px;margin-top:24px}
@media(min-width:980px){.suns{grid-template-columns:1fr 1fr}}
.sun{background:linear-gradient(180deg,rgba(21,12,42,.85),rgba(10,5,22,.9));border:1px solid var(--line);
  border-radius:22px;padding:16px 14px 10px;position:relative;overflow:hidden;scroll-margin-top:150px;
  box-shadow:0 10px 40px rgba(0,0,0,.45)}
.sun::before{content:"";position:absolute;inset:0;border-radius:22px;padding:1px;
  background:linear-gradient(180deg,var(--g),transparent 60%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.65;pointer-events:none}
.sun::after{content:"";position:absolute;left:0;right:0;top:0;height:120px;pointer-events:none;
  background:radial-gradient(60% 100% at 50% 0%,color-mix(in srgb,var(--g) 18%,transparent),transparent 75%)}
.sun-head{display:flex;align-items:center;gap:10px;padding:2px 6px 6px;position:relative;z-index:2}
.sun-head .gdot{width:12px;height:12px;border-radius:50%;background:var(--g);
  box-shadow:0 0 10px var(--g),0 0 22px var(--g);flex:none}
.sun-head .gt{font-family:var(--neon);font-size:15px;font-weight:400;letter-spacing:.05em;color:#fff;
  text-shadow:0 0 10px color-mix(in srgb,var(--g) 85%,transparent)}
.sun-head .gc{margin-left:auto;font-family:var(--neon);font-size:12px;color:var(--mut);
  border:1px solid color-mix(in srgb,var(--g) 45%,transparent);padding:3px 10px;border-radius:999px;
  box-shadow:inset 0 0 10px color-mix(in srgb,var(--g) 18%,transparent)}
.stage{position:relative;width:100%;max-width:560px;margin:0 auto}
.sun.wide{grid-column:1/-1}
.sun.wide .stage{max-width:980px}
.rays{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;
  color:var(--g);filter:drop-shadow(0 0 4px var(--g))}
.ray{stroke:var(--g);stroke-width:1.6;opacity:.5;stroke-linecap:round}
.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle at 50% 32%,color-mix(in srgb,var(--g) 30%,#0d0620),#090414 72%);
  border:2px solid var(--g);
  box-shadow:0 0 14px var(--g),0 0 42px -4px var(--g),inset 0 0 20px color-mix(in srgb,var(--g) 35%,transparent);
  padding:8px;z-index:3}
.core .cf{font-family:var(--jp);font-weight:700;line-height:1.25;color:#fff;
  text-shadow:0 0 8px color-mix(in srgb,var(--g) 90%,transparent)}
.core .cn{font-family:var(--neon);font-size:10.5px;color:rgba(255,255,255,.78);margin-top:3px;letter-spacing:.14em}
.petal{position:absolute;transform:translate(-50%,-50%);z-index:4;cursor:pointer;
  width:150px;text-align:center;
  color:var(--ink);background:color-mix(in srgb,var(--g) 10%,rgba(13,6,26,.92));
  border:1px solid color-mix(in srgb,var(--g) 60%,transparent);
  padding:8px 10px;border-radius:13px;
  box-shadow:0 3px 14px rgba(0,0,0,.5),inset 0 0 12px color-mix(in srgb,var(--g) 10%,transparent);
  transition:transform .12s,box-shadow .12s,background .12s}
.petal .pj{display:block;font-family:var(--jp);font-size:14px;font-weight:700;line-height:1.2;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.petal .pp{margin-top:4px;font-size:10.5px;line-height:1.3;color:var(--mut);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.petal:hover,.petal:focus{transform:translate(-50%,-50%) scale(1.05);
  background:color-mix(in srgb,var(--g) 20%,rgba(15,7,30,.95));
  box-shadow:0 0 0 1px var(--g),0 0 18px color-mix(in srgb,var(--g) 70%,transparent),0 8px 22px rgba(0,0,0,.5);
  outline:none;z-index:6}
.petal.dim{opacity:.12;filter:grayscale(.6)}
.petal.hit{background:color-mix(in srgb,var(--g) 28%,#0b0518);
  box-shadow:0 0 0 1.5px var(--g),0 0 22px var(--g),0 8px 22px rgba(0,0,0,.55)}
.petal.hit .pj{color:#fff;text-shadow:0 0 8px var(--g)}
.petal.hit .pp{color:#efe6ff}
.sun.hiddenGroup{display:none}
/* mobile list mode: when the sun can't fit, stack the cards */
.sun.list .stage{height:auto!important}
.sun.list .rays{display:none}
.sun.list .core{position:static;transform:none;width:100%!important;height:auto!important;
  border-radius:16px;flex-direction:row;gap:8px;padding:10px 14px;margin-bottom:10px}
.sun.list .core .cf{font-size:15px!important}
.sun.list .core .cn{margin-top:0}
.sun.list .petal{position:static;transform:none;width:100%!important;display:block;
  text-align:left;margin:8px 0;padding:10px 14px}
.sun.list .petal .pj{white-space:normal}
.sun.list .petal .pp{-webkit-line-clamp:3}
.sun.list .petal:hover,.sun.list .petal:focus{transform:none}
.emptyNote{text-align:center;color:var(--faint);padding:40px 10px;display:none;font-size:14px}

/* modal */
.ov{position:fixed;inset:0;z-index:60;
  background:radial-gradient(120% 120% at 50% -10%,rgba(255,46,166,.12),transparent 55%),rgba(5,2,12,.82);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.card{--gc:#26e6ff;width:100%;max-width:520px;position:relative;
  background:linear-gradient(180deg,#180d31,#0b0620);
  border:1px solid color-mix(in srgb,var(--gc) 55%,transparent);border-radius:20px;padding:22px 22px 20px;
  box-shadow:
    0 0 0 1px color-mix(in srgb,var(--gc) 30%,transparent),
    0 0 24px color-mix(in srgb,var(--gc) 45%,transparent),
    0 0 70px rgba(255,46,166,.20),
    0 30px 80px rgba(0,0,0,.72);
  animation:pop .18s ease}
.card::before{content:"";position:absolute;inset:0;z-index:0;border-radius:20px;padding:1px;pointer-events:none;
  background:linear-gradient(150deg,var(--gc),transparent 45%,var(--np) 108%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;opacity:.9}
.card::after{content:"";position:absolute;left:0;right:0;top:0;z-index:0;height:130px;border-radius:20px 20px 0 0;pointer-events:none;
  background:radial-gradient(70% 100% at 50% 0%,color-mix(in srgb,var(--gc) 20%,transparent),transparent 72%)}
.card>*{position:relative;z-index:1}
@keyframes pop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.card .x{position:absolute;top:12px;right:12px;z-index:3;border:0;background:rgba(255,255,255,.06);color:var(--mut);
  width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;transition:.15s}
.card .x:hover{background:rgba(255,46,166,.28);color:#fff;box-shadow:0 0 14px rgba(255,46,166,.6)}
.card .gtag{display:inline-flex;align-items:center;gap:7px;font-family:var(--neon);font-size:12px;color:#fff;
  background:color-mix(in srgb,var(--gc) 12%,rgba(10,5,24,.6));
  border:1px solid color-mix(in srgb,var(--gc) 55%,transparent);padding:4px 11px;border-radius:999px;
  box-shadow:0 0 12px color-mix(in srgb,var(--gc) 30%,transparent),inset 0 0 10px color-mix(in srgb,var(--gc) 12%,transparent);
  text-shadow:0 0 8px color-mix(in srgb,var(--gc) 70%,transparent)}
.card .gtag .d{width:9px;height:9px;border-radius:50%;box-shadow:0 0 10px currentColor}
.card .jpbig{font-family:var(--jp);font-size:30px;font-weight:700;margin:14px 0 2px;line-height:1.2;color:#fff;
  text-shadow:0 0 8px color-mix(in srgb,var(--gc) 90%,transparent),
    0 0 22px color-mix(in srgb,var(--gc) 60%,transparent),
    0 0 40px color-mix(in srgb,var(--gc) 35%,transparent)}
.card .en{color:var(--faint);font-size:13px;font-style:italic;margin-bottom:16px}
.row{display:flex;gap:10px;margin:10px 0;align-items:flex-start}
.row .k{flex:none;width:96px;font-family:var(--neon);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:color-mix(in srgb,var(--gc) 80%,#ffffff 10%);padding-top:3px;
  text-shadow:0 0 8px color-mix(in srgb,var(--gc) 45%,transparent)}
.row .v{font-size:14.5px;line-height:1.5;color:var(--ink)}
.forma-v{color:#ffe0a6;font-weight:600;text-shadow:0 0 8px rgba(255,176,32,.5),0 0 18px rgba(255,176,32,.25)}
.ex{margin-top:16px;background:linear-gradient(180deg,rgba(255,176,32,.05),rgba(0,0,0,.4));
  border:1px solid rgba(255,176,32,.28);border-left:3px solid var(--na);border-radius:14px;padding:14px 16px;
  box-shadow:0 0 18px rgba(255,176,32,.12),inset 0 0 22px rgba(255,176,32,.05)}
.ex .exjp{font-family:var(--jp);font-size:21px;line-height:1.55;font-weight:500;color:#fff;
  text-shadow:0 0 10px rgba(255,176,32,.28)}
.ex .expl{color:var(--mut);font-size:13.5px;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,176,32,.25)}
.tip{position:fixed;z-index:55;pointer-events:none;max-width:260px;
  background:#0a0518;border:1px solid rgba(38,230,255,.4);border-radius:12px;padding:9px 12px;
  font-size:12.5px;line-height:1.4;color:var(--ink);
  box-shadow:0 0 16px rgba(38,230,255,.2),0 12px 30px rgba(0,0,0,.6);
  opacity:0;transition:opacity .1s}
.tip.show{opacity:1}
.tip .tj{font-family:var(--jp);font-weight:700;margin-bottom:2px}
.tip .tp{color:var(--mut)}
.footer-neon{display:flex;justify-content:center;margin-top:56px}
.footer-neon svg{width:96px;filter:drop-shadow(0 6px 18px rgba(255,46,166,.2))}
footer{margin-top:14px;text-align:center;color:var(--faint);font-size:12.5px;line-height:1.7}
.hint{color:var(--faint);font-size:12px;text-align:center;margin-top:8px}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="jpt">日本語 文法</span>
      <h1 id="htitle"></h1>
      <div class="chips-row">
        <div class="searchbox" id="searchbox">
          <button class="sicon" id="sbtn" type="button" aria-label="Szukaj" title="Szukaj">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
          <input id="q" type="text" placeholder="Szukaj gramatyki, znaczenia, przykładu…" autocomplete="off">
          <button class="clr" id="clr" type="button" title="Wyczyść">×</button>
        </div>
        <div class="chips" id="chips"></div>
      </div>
      <div class="brand-right">
        <div class="langtog" id="langtog">
          <button type="button" data-l="pl" class="active">PL</button>
          <button type="button" data-l="en">EN</button>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <svg class="neonCat" viewBox="0 0 210 172" role="img" aria-label="Neonowy kotek jedzący ramen">
      <defs>
        <filter id="ng" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g filter="url(#ng)" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <g class="steam" stroke-width="2.2">
          <path d="M62,96 C56,88 68,82 62,72 C58,65 66,60 63,52"/>
          <path d="M126,90 C121,83 131,78 126,69"/>
          <path d="M148,96 C142,88 154,82 148,72 C144,65 152,60 149,52"/>
        </g>
        <g stroke="#ff2ea6">
          <path d="M60,64 C58,44 62,34 68,28 L74,36 C82,30 96,30 104,36 L110,28 C116,34 120,44 118,64 C118,80 106,88 89,88 C72,88 60,80 60,64 Z"/>
          <path d="M74,58 q5,-6 10,0"/>
          <path d="M94,58 q5,-6 10,0"/>
          <path d="M84,68 q3,4 6,0 q3,4 6,0"/>
          <path d="M56,58 h-13 M57,66 h-12 M121,58 h13 M120,66 h12"/>
          <path d="M116,74 C130,78 142,72 150,64"/>
          <circle cx="153" cy="63" r="5.5"/>
        </g>
        <g stroke="#ffb020">
          <path d="M150,58 L112,104"/>

// radial layout — one ring per sun, card width adapts to fit → no overlaps
const CH=64, GAP=14, CWMAX=150, CWMIN=98;
function layout(){
  stages.forEach(({stage,svg,its,core})=>{
    const W=stage.clientWidth; if(!W) return;
    const n=its.length;
    const sec=stage.closest('.sun');
    // stacked list only when the sun has more than 6 rays AND the screen is narrow
    if(W<520 && n>6){
      sec.classList.add('list');
      stage.style.height='';
      its.forEach(it=>{it._el.style.left='';it._el.style.top='';it._el.style.width='';it._ray=null;});
      svg.innerHTML='';
      core.style.width='';core.style.height='';
      return;
    }
    sec.classList.remove('list');
    const halfAvail=W/2-8;
    const s=Math.sin(Math.PI/Math.max(n,2));
    // widest card that still lets a single ring fit horizontally
    const cwRaw=Math.min(CWMAX,(halfAvail-GAP/(2*s))/(1/(2*s)+0.5));
    // clearance so that a card sitting on the horizontal axis never touches the core:
    // it must clear HALF THE CARD WIDTH, not just the height
    const clearR=cw=>58+cw/2+GAP;
    let rings, cw;
    if(cwRaw>=CWMIN || n<=6){
      cw=Math.max(CWMIN,Math.min(CWMAX,cwRaw));
      // on narrow screens let cards shrink below CWMIN so the whole sun still fits
      cw=Math.max(78,Math.min(cw,halfAvail-(58+GAP)));
      const r=Math.max(clearR(cw),(cw+GAP)/(2*s));
      rings=[{r,c:n,off:-90,cw}];
    } else {                                     // narrow-screen fallback: two rings
      cw=CWMIN;
      const inner=Math.ceil(n/2), outer=n-inner;
      const si=Math.sin(Math.PI/Math.max(inner,2)), so=Math.sin(Math.PI/Math.max(outer,2));
      const r0=Math.max(clearR(cw),(cw+GAP)/(2*si));
      const r1=Math.max(r0+CH+GAP,(cw+GAP)/(2*so));
      rings=[{r:r0,c:inner,off:-90,cw},{r:r1,c:outer,off:-90+180/outer,cw}];
    }
    const Rmax=rings[rings.length-1].r, rInner=rings[0].r;
    // core fills the centre without touching the inner ring (clear half the card width)
    const cd=Math.min(Math.max(114,Math.min(196,Rmax*0.5)), 2*(rInner-cw/2-GAP));
    const coreR=cd/2;
    core.style.width=cd+'px'; core.style.height=cd+'px';
    const cf=core.querySelector('.cf'); cf.style.fontSize=Math.max(12,Math.min(22,cd*0.15))+'px';
    const H=2*Rmax+CH+24;
    stage.style.height=H+'px';
    const cx=W/2, cy=H/2;
    let idx=0;
    rings.forEach(ring=>{
      for(let k=0;k<ring.c;k++){
        const it=its[idx++]; if(!it) break;
        const ang=(ring.off + k*360/ring.c)*Math.PI/180;
        const x=cx+ring.r*Math.cos(ang), y=cy+ring.r*Math.sin(ang);
        it._el.style.left=x+'px'; it._el.style.top=y+'px'; it._el.style.width=ring.cw+'px';
        it._x=x; it._y=y;
      }
    });
    // rays (px coords)
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.innerHTML='';
    its.forEach(it=>{
      const dx=it._x-cx, dy=it._y-cy, len=Math.hypot(dx,dy)||1;
      const sx=cx+dx/len*coreR, sy=cy+dy/len*coreR;
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',sx);l.setAttribute('y1',sy);l.setAttribute('x2',it._x);l.setAttribute('y2',it._y);
      l.setAttribute('class','ray'); it._ray=l; svg.appendChild(l);
    });
  });
}

const tip=document.getElementById('tip');
function showTip(e,it){tip.innerHTML=`<div class="tj">${iJp(it)}</div><div class="tp">${iMean(it)||''}</div>`;tip.classList.add('show');moveTip(e);}
function moveTip(e){let x=e.clientX+14,y=e.clientY+14;const r=tip.getBoundingClientRect();if(x+r.width>innerWidth-8)x=e.clientX-r.width-14;if(y+r.height>innerHeight-8)y=e.clientY-r.height-14;tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.classList.remove('show')}

// search
const q=document.getElementById('q'), clr=document.getElementById('clr'), empty=document.getElementById('empty');
const searchbox=document.getElementById('searchbox'), sbtn=document.getElementById('sbtn');
function openSearch(){searchbox.classList.add('open');q.focus();}
function maybeCloseSearch(){if(!q.value.trim()&&document.activeElement!==q)searchbox.classList.remove('open');}
sbtn.addEventListener('click',()=>{searchbox.classList.contains('open')?maybeCloseSearch():openSearch();});
q.addEventListener('blur',()=>setTimeout(maybeCloseSearch,120));
function applySearch(){
  const t=norm(q.value).trim();
  clr.style.display=t?'block':'none';
  let anyGlobal=false;
  stages.forEach(({g,its})=>{
    let any=false;
    its.forEach(it=>{
      const hit = !t || [it.jp,it.jpEN,it.label,it.labelEN,it.pl,it.en,it.ex,it.plex,it.forma,it.mEN,it.fEN,it.xEN].some(f=>norm(f).includes(t));
      it._el.classList.toggle('dim',!hit);
      it._el.classList.toggle('hit',!!t&&hit);
      if(it._ray)it._ray.style.opacity=hit?'':'0.06';
      if(hit)any=true;
    });
    if(any)anyGlobal=true;
  });
  empty.style.display=anyGlobal?'none':'block';
}
q.addEventListener('input',applySearch);
clr.addEventListener('click',()=>{q.value='';applySearch();q.focus();});

// chip filter
let solo='all';
chips.addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  const gid=c.dataset.g;
  [...chips.children].forEach(ch=>{ch.classList.remove('active');ch.style.background='';ch.style.borderColor='';});
  c.classList.add('active');
  if(gid!=='all'){const col=byId[gid].color;c.style.background=col;c.style.borderColor=col;}
  solo=gid;
  stages.forEach(({g})=>{
    const sec=document.getElementById('g-'+g.id);
    sec.classList.toggle('hiddenGroup', gid!=='all' && g.id!==gid);
  });
  if(gid!=='all'){const sec=document.getElementById('g-'+gid);sec.scrollIntoView({behavior:'smooth',block:'start'});}
  requestAnimationFrame(layout);
});

// ---- scrolled header: swap title → search + filters ----
const topHeader=document.querySelector('header.top');
function onScroll(){
  const sc=window.scrollY||document.documentElement.scrollTop;
  // small hysteresis so it doesn't flicker right at the threshold
  if(sc>90) topHeader.classList.add('scrolled');
  else if(sc<40) topHeader.classList.remove('scrolled');
}
window.addEventListener('scroll',onScroll,{passive:true});
onScroll();

// ---- apply language to all text ----
const elHtitle=document.getElementById('htitle'), elFooter=document.getElementById('footer');
function applyLang(){
  const t=UI[lang];
  document.documentElement.lang=lang;
  elHtitle.textContent=t.htitle;
  elFooter.innerHTML=t.footer;
  empty.textContent=t.empty;
  q.placeholder=t.ph; clr.title=t.clr;
  const hT=document.getElementById('heroTag'), hO=document.getElementById('heroOpen');
  if(hT)hT.textContent=t.heroTag; if(hO)hO.textContent=t.heroOpen;
  // chips
  [...chips.children].forEach(ch=>{
    const gid=ch.dataset.g;
    if(gid==='all'){ ch.textContent=t.all; }
    else { ch.querySelector('.ct').textContent=gTitle(byId[gid]); }
  });
  // suns: titles, cores, petals
  stages.forEach(({g,its})=>{
    const sec=document.getElementById('g-'+g.id);
    sec.querySelector('.gt').textContent=gTitle(g);
    sec.querySelector('.core .cf').textContent=gSub(g);
    its.forEach(it=>{ it._pj.textContent=iLabel(it); it._pp.textContent=iMean(it); });
  });
  if(ov.classList.contains('open')) renderCard();
}
const langtog=document.getElementById('langtog');
langtog.addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  const nl=b.dataset.l; if(nl===lang)return;
  lang=nl;
  [...langtog.children].forEach(x=>x.classList.toggle('active',x.dataset.l===lang));
  applyLang();
});
applyLang();
</script>
